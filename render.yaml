services:
  # ── Frontend: React Static Site ──────────────────────────────
  - type: web
    name: engineers-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://engineers-backend.onrender.com"

  # ── Backend: Node.js Web Service ─────────────────────────────
  - type: web
    name: engineers-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: engineers-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "https://engineers-frontend.onrender.com"
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: "production"

# ── Databáze: PostgreSQL ───────────────────────────────────────
databases:
  - name: engineers-db
    plan: free
    ipAllowList: []
