services:
  # ── Frontend: React Static Site ──────────────────────────────
  - type: web
    name: erasmus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://erasmus-backend.onrender.com" # Dočasná adresa

  # ── Backend: Node.js Web Service ─────────────────────────────
  - type: web
    name: erasmus-backend
    runtime: node
    rootDir: backend/ExerciseCode
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erasmus-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "https://erasmus-frontend.onrender.com" # Dočasná adresa
      - key: NODE_VERSION
        value: "20"

# ── Databáze: PostgreSQL ───────────────────────────────────────
databases:
  - name: erasmus-db
    plan: free
    ipAllowList: []
