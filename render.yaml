services:
  # ── Frontend: React Static Site ──────────────────────────────
  - type: web
    name: engineers-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://engineers-backend.onrender.com"

  # ── Backend: Node.js Web Service ─────────────────────────────
  - type: web
    name: engineers-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: engineers-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "https://engineers-frontend.onrender.com"
      - key: NODE_VERSION
        value: "20"

# ── Databáze: PostgreSQL ───────────────────────────────────────
databases:
  - name: engineers-db
    plan: free
    ipAllowList: []
